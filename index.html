<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>明日之屋 · 海报工坊</title>

<!-- Apple-style CJK + Latin fonts via Google Fonts CDN -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<style>
  :root {
    /* MORROWNEST brand-themed admin chrome */
    --bg: #faf6ef;
    --panel: #ffffff;
    --ink: #2a2118;
    --ink-muted: #7a6d57;
    --line: #ece4d2;
    --accent: #8b5a2b;
    --radius: 12px;
    --shadow: 0 1px 2px rgba(73,49,21,.05), 0 14px 30px -10px rgba(73,49,21,.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    background: rgba(250,246,239,.86);
    border-bottom: 1px solid var(--line);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 12px; font-weight: 600; letter-spacing: -.01em; }
  .brand img { width: 32px; height: 32px; }
  .topbar small { color: var(--ink-muted); font-weight: 400; margin-left: 6px; }
  .topbar .actions { display: flex; gap: 10px; }
  .btn {
    border: none; cursor: pointer; padding: 9px 18px; border-radius: 999px;
    font-weight: 500; font-size: 14px;
    transition: all .15s ease;
  }
  .btn:focus { outline: 2px solid #0071e3; outline-offset: 2px; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #0077ed; transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--ink); }
  .btn-ghost:hover { background: rgba(0,0,0,.05); }

  /* ---------- Layout ---------- */
  .app {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 24px;
    padding: 24px 28px 60px;
    max-width: 1500px;
    margin: 0 auto;
  }
  @media (max-width: 980px) {
    .app { grid-template-columns: 1fr; }
  }

  /* ---------- Sidebar form ---------- */
  .panel {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px;
  }
  .panel h2 {
    margin: 0 0 16px;
    font-size: 13px; font-weight: 600;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field label {
    font-size: 12px; color: var(--ink-muted); font-weight: 500;
  }
  .field input[type="text"],
  .field textarea {
    width: 100%; border: 1px solid var(--line);
    background: #fbfbfd;
    border-radius: 8px;
    padding: 10px 12px;
    font: inherit; font-size: 14px; color: var(--ink);
    transition: border-color .15s, background .15s;
  }
  .field input[type="text"]:focus,
  .field textarea:focus {
    outline: none; border-color: var(--accent); background: white;
  }
  .field textarea { resize: vertical; min-height: 64px; }

  /* Pill segmented controls (theme/size pickers) */
  .seg {
    display: inline-flex; background: #f0f0f3;
    border-radius: 999px; padding: 3px;
    width: 100%;
  }
  .seg button {
    flex: 1; border: none; cursor: pointer;
    padding: 8px 10px; border-radius: 999px;
    font-size: 13px; font-weight: 500; background: transparent;
    color: var(--ink); transition: background .15s, color .15s;
  }
  .seg button:hover { color: var(--ink); }
  .seg button.active {
    background: white; color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,.06);
  }

  /* Color row */
  .colors { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch {
    width: 26px; height: 26px; border-radius: 50%;
    cursor: pointer; border: 2px solid white;
    box-shadow: 0 0 0 1px var(--line);
  }
  .swatch.active { box-shadow: 0 0 0 2px var(--accent); }
  .field input[type="color"] {
    width: 26px; height: 26px; padding: 0; border: none; background: none; cursor: pointer;
  }

  /* ---------- Preview area ---------- */
  .stage {
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    gap: 16px;
  }
  .stage-frame {
    width: 100%;
    background: #fafafa;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 30px;
    display: flex; align-items: center; justify-content: center;
    min-height: 480px;
  }
  .preview-wrap {
    position: relative;
    box-shadow: 0 10px 40px -10px rgba(0,0,0,.20);
    border-radius: 8px;
    overflow: hidden;
    background: white;
  }
  canvas#preview {
    display: block;
    max-width: 100%;
    height: auto;
  }

  .legend { color: var(--ink-muted); font-size: 12px; }

  /* ---------- Loading state ---------- */
  .loading { color: var(--ink-muted); font-size: 13px; }
  .loading::after {
    content: " "; display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: currentColor;
    margin-left: 4px; animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: .3 } }

  /* ---------- Footer hint ---------- */
  .hint {
    margin-top: 14px; padding: 14px;
    background: rgba(0,113,227,.06);
    border-radius: 8px; color: var(--ink);
    font-size: 13px; line-height: 1.5;
  }
  .hint code {
    background: rgba(0,0,0,.06); padding: 1px 6px; border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <img id="brand-logo" alt="明日之屋" />
    <span>明日之屋 · 海报工坊 <small style="color:var(--ink-muted); font-weight: 400; margin-left: 4px">MORROWNEST</small></span>
  </div>
  <div class="actions">
    <button id="btn-reset" class="btn btn-ghost">重置</button>
    <button id="btn-download" class="btn btn-primary">下载 PNG</button>
  </div>
</header>

<main class="app">

  <!-- ============ Sidebar ============ -->
  <aside class="panel">
    <h2>文案</h2>
    <div class="field">
      <label for="f-tagline">小标签 / Tagline</label>
      <input id="f-tagline" type="text" placeholder="如：全新一代 New" />
    </div>
    <div class="field">
      <label for="f-title">主标题 *</label>
      <input id="f-title" type="text" placeholder="如：重新定义专业" />
    </div>
    <div class="field">
      <label for="f-subtitle">副标题</label>
      <input id="f-subtitle" type="text" placeholder="如：Pro Display XDR" />
    </div>
    <div class="field">
      <label for="f-body">正文描述</label>
      <textarea id="f-body" placeholder="如：迄今最先进的专业显示器，专为追求极致的人而生。"></textarea>
    </div>
    <div class="field">
      <label for="f-cta">行动号召 / CTA</label>
      <input id="f-cta" type="text" placeholder="如：立即了解" />
    </div>

    <h2 style="margin-top:24px">主题</h2>
    <div class="seg" id="seg-theme" data-name="theme">
      <button data-value="tech">tech</button>
      <button data-value="literary" class="active">literary</button>
      <button data-value="bold">bold</button>
    </div>

    <h2 style="margin-top:24px">尺寸</h2>
    <div class="seg" id="seg-size" data-name="size">
      <button data-value="square">1:1</button>
      <button data-value="vertical" class="active">9:16</button>
      <button data-value="horizontal">16:9</button>
      <button data-value="ecommerce">3:4</button>
    </div>

    <h2 style="margin-top:24px">强调色</h2>
    <div class="field" style="margin: 0">
      <div class="colors" id="swatches">
        <!-- filled by JS -->
        <input type="color" id="f-accent-custom" value="#0071e3" title="自定义颜色" />
      </div>
    </div>

    <h2 style="margin-top:24px">品牌 Logo</h2>
    <div class="field">
      <label>明日之屋品牌 logo 已内置；如需替换可上传新文件</label>
      <div style="display:flex; gap:8px; align-items:center">
        <input id="f-logo" type="file" accept="image/png,image/svg+xml,image/jpeg" style="flex:1; font-size:12px" />
        <button type="button" id="f-logo-clear" class="btn btn-ghost" style="padding:6px 12px; font-size:12px">不显示</button>
      </div>
    </div>
    <div class="field">
      <label>位置</label>
      <div class="seg" id="seg-logo-pos">
        <button data-value="top" class="active">顶部</button>
        <button data-value="bottom-center">底部</button>
        <button data-value="bottom-left">左下</button>
        <button data-value="bottom-right">右下</button>
      </div>
    </div>
    <div class="field">
      <label for="f-logo-size">尺寸（短边占比）<span id="f-logo-size-val" style="color:var(--ink-muted)">16%</span></label>
      <input id="f-logo-size" type="range" min="6" max="22" step="1" value="16" />
    </div>

    <h2 style="margin-top:24px">AI 背景层 <span style="color:var(--ink-muted); font-weight:400; font-size:11px; text-transform:none; letter-spacing:0">gpt-image-2</span></h2>
    <div class="field" id="ai-key-panel">
      <label for="f-ai-key">第一次使用：填一次你的 OpenAI API key（存浏览器本地）</label>
      <div style="display:flex; gap:6px; align-items:center">
        <input id="f-ai-key" type="password" placeholder="sk-proj-..." style="flex:1; border:1px solid var(--line); background:#fbfbfd; border-radius:8px; padding:8px 10px; font-size:13px; font-family:ui-monospace,Menlo,Consolas,monospace" />
        <button type="button" id="btn-ai-key-save" class="btn btn-primary" style="padding:7px 14px; font-size:12px">保存</button>
      </div>
      <div style="color:var(--ink-muted); font-size:11px; margin-top:4px">
        没有的话去 <a href="https://platform.openai.com/api-keys" target="_blank" style="color:var(--accent)">platform.openai.com/api-keys</a> 生成。仅存在你这台浏览器，不会上传。
      </div>
    </div>
    <div class="field" id="ai-key-saved" style="display:none">
      <label>API key 已配置 <span id="ai-key-mask" style="font-family:ui-monospace,Menlo,monospace; color:var(--ink)"></span></label>
      <button type="button" id="btn-ai-key-edit" class="btn btn-ghost" style="padding:6px 12px; font-size:12px; align-self:flex-start">更换 key</button>
    </div>

    <div class="field">
      <label for="f-ai-prompt">背景描述（中英文都行）</label>
      <textarea id="f-ai-prompt" placeholder="例：温暖水彩晕染背景，米色与铜色，手绘纸纹，无文字" style="min-height:64px"></textarea>
    </div>
    <div class="field" style="margin-bottom:8px">
      <label>快捷预设（点了会填到上面）</label>
      <div style="display:flex; flex-wrap:wrap; gap:6px" id="ai-presets">
        <button type="button" class="btn btn-ghost preset" data-prompt="温暖水彩晕染背景，米色与铜色渐层，手绘纸纹质感，无文字" style="padding:6px 10px; font-size:11px; background:#f0eadf">水彩晕染</button>
        <button type="button" class="btn btn-ghost preset" data-prompt="柔和的纸纹背景，米色基调带细微铜色斑点，手工感，极简，无文字" style="padding:6px 10px; font-size:11px; background:#f0eadf">纸纹</button>
        <button type="button" class="btn btn-ghost preset" data-prompt="抽象油画质感背景，温暖橙棕色调融合，像清晨阳光，柔和模糊，无文字" style="padding:6px 10px; font-size:11px; background:#f0eadf">油画质感</button>
        <button type="button" class="btn btn-ghost preset" data-prompt="柔和的几何渐变，米色到铜色的对角晕染，极简编辑设计，无文字" style="padding:6px 10px; font-size:11px; background:#f0eadf">几何渐变</button>
        <button type="button" class="btn btn-ghost preset" data-prompt="温暖的家庭感图像，孩童手绘风格，铜棕色单色线稿，背景留白，无文字" style="padding:6px 10px; font-size:11px; background:#f0eadf">手绘线稿</button>
      </div>
    </div>
    <div class="field">
      <button type="button" id="btn-ai-generate" class="btn btn-primary" style="width:100%; padding:11px">生成 AI 背景（约 ¥0.3）</button>
      <div id="ai-status" style="font-size:12px; color:var(--ink-muted); margin-top:6px; min-height:18px"></div>
    </div>
    <div class="field">
      <label for="f-ai-strength">背景显示强度 <span id="f-ai-strength-val" style="color:var(--ink-muted)">50%</span></label>
      <input id="f-ai-strength" type="range" min="0" max="100" step="5" value="50" />
      <div style="color:var(--ink-muted); font-size:11px; margin-top:2px">越高背景越明显，文字可读性会降低；建议 40–60%</div>
    </div>
    <div class="field" style="margin: 0">
      <button type="button" id="btn-ai-clear" class="btn btn-ghost" style="padding:6px 12px; font-size:12px; align-self:flex-start">移除 AI 背景，恢复纯色</button>
    </div>

    <div class="hint">
      默认主题：<b>literary</b>（米色 + 思源宋体）+ 铜色强调，匹配明日之屋品牌。AI 背景：单图成本约 0.04 美元（中等画质），出错或不满意可立即重新生成。
    </div>
  </aside>

  <!-- ============ Preview ============ -->
  <section class="stage">
    <div class="stage-frame">
      <div class="preview-wrap">
        <canvas id="preview" width="1080" height="1080"></canvas>
      </div>
    </div>
    <div class="legend" id="legend">就绪</div>
  </section>

</main>

const CJK_RANGES = [
  [0x3000, 0x303F], [0x3400, 0x4DBF], [0x4E00, 0x9FFF],
  [0xF900, 0xFAFF], [0xFF00, 0xFFEF],
];
function isCJK(ch) {
  const cp = ch.codePointAt(0);
  for (const [lo, hi] of CJK_RANGES) if (cp >= lo && cp <= hi) return true;
  return false;
}
function segmentText(text) {
  const runs = [];
  for (const ch of text) {
    const cjk = isCJK(ch);
    if (runs.length && runs[runs.length-1].cjk === cjk) runs[runs.length-1].text += ch;
    else runs.push({ text: ch, cjk });
  }
  return runs;
}

/* ---- Canvas font helpers ---- */
const LATIN_SCALE = 1.18;

function setFont(ctx, fontDecl, size) {
  ctx.font = `${fontDecl.weight} ${size}px ${fontDecl.family}, "Noto Sans SC", sans-serif`;
}

function measureRunWidth(ctx, run, st) {
  const sizePx = run.cjk ? st.size : Math.round(st.size * LATIN_SCALE);
  setFont(ctx, run.cjk ? st.cjkFont : st.latinFont, sizePx);
  const w = ctx.measureText(run.text).width;
  const extraPerChar = Math.round(st.letterSpacingEm * st.size);
  return w + extraPerChar * run.text.length;
}

function measureLineWidth(ctx, line, st) {
  let w = 0;
  for (const r of segmentText(line)) w += measureRunWidth(ctx, r, st);
  return w;
}

function wrapLines(ctx, text, maxW, st) {
  if (!text) return [''];
  const out = [];
  for (const raw of text.split('\n')) {
    if (measureLineWidth(ctx, raw, st) <= maxW) { out.push(raw); continue; }
    const hasCJK = [...raw].some(isCJK);
    if (hasCJK) {
      let buf = '';
      for (const ch of raw) {
        const trial = buf + ch;
        if (measureLineWidth(ctx, trial, st) <= maxW || !buf) buf = trial;
        else { out.push(buf); buf = ch; }
      }
      if (buf) out.push(buf);
    } else {
      const words = raw.split(' ');
      let buf = '';
      for (const w of words) {
        const trial = buf ? buf + ' ' + w : w;
        if (measureLineWidth(ctx, trial, st) <= maxW || !buf) buf = trial;
        else { out.push(buf); buf = w; }
      }
      if (buf) out.push(buf);
    }
  }
  return out.length ? out : [''];
}

/* Approx ascent/baseline: use measureText's actualBoundingBoxAscent/Descent. */
function getBaseline(ctx, fontDecl, size) {
  setFont(ctx, fontDecl, size);
  // CJK characters have full-em ascent; '汉' fills the em box well.
  const m = ctx.measureText('汉');
  return m.actualBoundingBoxAscent || size * 0.85;
}

function drawStyledLine(ctx, line, x, y, boxW, st) {
  const runs = segmentText(line);
  const lineW = runs.reduce((s, r) => s + measureRunWidth(ctx, r, st), 0);
  let cx;
  if (st.align === 'center') cx = x + (boxW - lineW) / 2;
  else if (st.align === 'right') cx = x + boxW - lineW;
  else cx = x;

  // Compute shared baseline (the larger of the two)
  const cjkSize = st.size;
  const latinSize = Math.round(st.size * LATIN_SCALE);
  const cjkAsc = getBaseline(ctx, st.cjkFont, cjkSize);
  const latinAsc = getBaseline(ctx, st.latinFont, latinSize);
  const baseline = y + Math.max(cjkAsc, latinAsc);

  ctx.fillStyle = st.color;
  ctx.textBaseline = 'alphabetic';

  const extraPerChar = Math.round(st.letterSpacingEm * st.size);

  for (const run of runs) {
    const sizePx = run.cjk ? cjkSize : latinSize;
    const fontDecl = run.cjk ? st.cjkFont : st.latinFont;
    setFont(ctx, fontDecl, sizePx);
    for (const ch of run.text) {
      ctx.fillText(ch, cx, baseline);
      cx += ctx.measureText(ch).width + extraPerChar;
    }
  }
  return lineW;
}

function drawStyledBlock(ctx, text, x, y, boxW, st) {
  const lines = wrapLines(ctx, text, boxW, st);
  const lineAdvance = Math.round(st.size * st.lineHeight);
  let cy = y;
  for (const line of lines) {
    drawStyledLine(ctx, line, x, cy, boxW, st);
    cy += lineAdvance;
  }
  return cy - y;
}
function blockHeight(ctx, text, boxW, st) {
  if (!text) return 0;
  const lines = wrapLines(ctx, text, boxW, st);
  return Math.round(st.size * st.lineHeight) * lines.length;
}

/* ---- Background ---- */
function drawBackground(ctx, w, h, theme) {
  // 1. Base — either gradient or AI image
  if (state.aiBgImg && state.aiBgImg.complete) {
    drawCover(ctx, state.aiBgImg, 0, 0, w, h);
    // Soften the AI image with a wash of the theme's bg_top so text reads.
    // strength=0  -> wash is opaque (basically hides AI), strength=1 -> AI fully visible
    const washAlpha = Math.max(0, Math.min(0.95, 0.95 - state.aiBgStrength));
    ctx.fillStyle = hexWithAlpha(theme.bgTop, washAlpha);
    ctx.fillRect(0, 0, w, h);
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, theme.bgTop);
    grad.addColorStop(1, theme.bgBottom);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }

  if (theme.addGlow) {
    const g = ctx.createRadialGradient(w/2, h*0.85, 0, w/2, h*0.85, Math.min(w, h)*0.6);
    g.addColorStop(0, theme.accent + '22');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  }
}

/** Draw `img` to fill (cover) the rect (x,y,w,h) — equivalent to CSS object-fit:cover. */
function drawCover(ctx, img, x, y, w, h) {
  const ir = img.naturalWidth / img.naturalHeight;
  const cr = w / h;
  let sx, sy, sw, sh;
  if (ir > cr) {
    // image is wider — crop horizontally
    sh = img.naturalHeight;
    sw = sh * cr;
    sx = (img.naturalWidth - sw) / 2;
    sy = 0;
  } else {
    sw = img.naturalWidth;
    sh = sw / cr;
    sx = 0;
    sy = (img.naturalHeight - sh) / 2;
  }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

/** Convert "#RRGGBB" + alpha 0–1 → "rgba(..., a)" string */
function hexWithAlpha(hex, a) {
  const h = hex.replace('#', '');
  const r = parseInt(h.slice(0, 2), 16);
  const g = parseInt(h.slice(2, 4), 16);
  const b = parseInt(h.slice(4, 6), 16);
  return `rgba(${r}, ${g}, ${b}, ${a.toFixed(3)})`;
}

/* ---- Logo placement ---- */
function logoTargetSize(logoImg, short, sizePct) {
  const targetH = Math.max(24, Math.round(short * sizePct));
  const ratio = targetH / logoImg.naturalHeight;
  return { w: Math.max(1, Math.round(logoImg.naturalWidth * ratio)), h: targetH };
}
function logoXY(W, H, margin, lw, lh, position) {
  switch (position) {
    case 'top':           return { x: (W - lw) / 2, y: Math.round(margin / 2 + margin / 4) };
    case 'bottom-center': return { x: (W - lw) / 2, y: H - margin - lh };
    case 'bottom-left':   return { x: margin, y: H - margin - lh };
    case 'bottom-right':  return { x: W - margin - lw, y: H - margin - lh };
    default:              return { x: (W - lw) / 2, y: margin };
  }
}

/* ---- Compose ---- */
function composePoster(ctx, content, theme, sizeKey) {
  const [W, H] = SIZES[sizeKey];
  const canvas = ctx.canvas;
  canvas.width = W; canvas.height = H;

  drawBackground(ctx, W, H, theme);

  const short = Math.min(W, H);
  const margin = Math.round(short * 0.09);
  const boxW = W - 2 * margin;
  const boxX = margin;

  // Pre-compute logo metrics so we can reserve vertical space for top/bottom-center
  let logoMetrics = null;
  if (content.logoImg && content.logoImg.complete) {
    const sz = logoTargetSize(content.logoImg, short, content.logoSizePct || 0.07);
    logoMetrics = { ...sz, position: content.logoPosition || 'top' };
  }

  // Type sizing
  let titleSize = Math.round(short * 0.115);
  if (H > W * 1.4) titleSize = Math.round(short * 0.135);
  const subtitleSize = Math.round(short * 0.045);
  const bodySize     = Math.round(short * 0.028);
  const taglineSize  = Math.round(short * 0.026);
  const ctaSize      = Math.round(short * 0.030);

  const accentRgb = content.accentOverride || theme.accent;

  const mkStyle = (size, fontPair, color, lineHeight, ls = 0) => ({
    size, color,
    cjkFont: fontPair[0], latinFont: fontPair[1],
    letterSpacingEm: ls,
    lineHeight: lineHeight,
    align: 'center',
  });

  const DISPLAY = [theme.cjkDisplay, theme.latinDisplay];
  const TEXT    = [theme.cjkText,    theme.latinText];

  const tagline = mkStyle(taglineSize, TEXT, accentRgb, 1.2, 0.18);
  let title    = mkStyle(titleSize, DISPLAY, theme.fgPrimary, theme.titleLineHeight, theme.titleLetterSpacing);
  const subtitle = mkStyle(subtitleSize, DISPLAY, theme.fgSecondary, 1.25, -0.005);
  const body    = mkStyle(bodySize, TEXT, theme.fgMuted, theme.bodyLineHeight, 0.0);

  // Auto-shrink title until ≤ N lines
  const targetMaxLines = (H > W) ? 3 : 2;
  while (title.size > Math.round(short * 0.05)) {
    if (wrapLines(ctx, content.title, boxW, title).length <= targetMaxLines) break;
    title.size = Math.round(title.size * 0.92);
  }

  const hTagline = blockHeight(ctx, content.tagline, boxW, tagline);
  const hTitle   = blockHeight(ctx, content.title,   boxW, title);
  const hSubtitle= blockHeight(ctx, content.subtitle,boxW, subtitle);
  const hBody    = blockHeight(ctx, content.body,    Math.round(boxW * 0.85), body);

  const gapAfterTagline  = content.tagline ? Math.round(short * 0.03) : 0;
  const gapAfterTitle    = (content.subtitle || content.body) ? Math.round(short * 0.04) : 0;
  const gapAfterSubtitle = content.body ? Math.round(short * 0.025) : 0;

  const textTotal = hTagline + gapAfterTagline + hTitle + gapAfterTitle + hSubtitle + gapAfterSubtitle + hBody;

  const ctaH = content.cta ? Math.round(short * 0.085) : 0;
  const ctaTopMargin = content.cta ? Math.round(short * 0.07) : 0;

  // Reserve vertical space for logo when it's on the centerline (top / bottom-center).
  let topReserved = 0, bottomReserved = 0;
  if (logoMetrics) {
    if (logoMetrics.position === 'top') topReserved = logoMetrics.h + Math.round(short * 0.04);
    else if (logoMetrics.position === 'bottom-center') bottomReserved = logoMetrics.h + Math.round(short * 0.04);
  }

  const availableH = H - 2 * margin - ctaH - ctaTopMargin - topReserved - bottomReserved;
  let cy = margin + topReserved + Math.max(0, Math.floor((availableH - textTotal) / 2));

  if (content.tagline) {
    drawStyledBlock(ctx, content.tagline, boxX, cy, boxW, tagline);
    cy += hTagline + gapAfterTagline;
  }
  drawStyledBlock(ctx, content.title, boxX, cy, boxW, title);
  cy += hTitle + gapAfterTitle;

  if (content.subtitle) {
    drawStyledBlock(ctx, content.subtitle, boxX, cy, boxW, subtitle);
    cy += hSubtitle + gapAfterSubtitle;
  }
  if (content.body) {
    const bw = Math.round(boxW * 0.85);
    drawStyledBlock(ctx, content.body, (W - bw) / 2, cy, bw, body);
    cy += hBody;
  }

  // CTA
  if (content.cta) {
    const ctaY = H - margin - ctaH;
    if (theme.ctaStyle === 'pill') {
      const ctaSt = mkStyle(ctaSize, TEXT, theme.ctaFg, 1.0, 0);
      const tw = measureLineWidth(ctx, content.cta, ctaSt);
      // Visual height: estimate ascent+descent ~ 1.2x font size
      const visualH = ctaSize * 1.2;
      const padX = Math.round(ctaSize * 1.5);
      const padY = Math.round(ctaSize * 0.55);
      const pillW = tw + 2 * padX;
      const pillH = visualH + 2 * padY;
      const pillX = (W - pillW) / 2;
      const pillY = ctaY + (ctaH - pillH) / 2;

      ctx.fillStyle = theme.ctaBg || theme.accent;
      roundRect(ctx, pillX, pillY, pillW, pillH, pillH / 2, true);
      drawStyledLine(ctx, content.cta, pillX, pillY + padY, pillW, ctaSt);
    } else if (theme.ctaStyle === 'underline') {
      const ctaSt = mkStyle(ctaSize, TEXT, theme.ctaFg || theme.accent, 1.2, 0.05);
      const tw = measureLineWidth(ctx, content.cta, ctaSt);
      const cxl = (W - tw) / 2;
      drawStyledLine(ctx, content.cta, cxl, ctaY, tw, ctaSt);
      const uy = ctaY + ctaSize * 1.15;
      ctx.strokeStyle = theme.ctaFg || theme.accent;
      ctx.lineWidth = Math.max(2, ctaSize / 14);
      ctx.beginPath();
      ctx.moveTo(cxl, uy);
      ctx.lineTo(cxl + tw, uy);
      ctx.stroke();
    }
  }

  // Logo painted last so it sits over the background but inside the canvas.
  if (logoMetrics) {
    const { x, y } = logoXY(W, H, margin, logoMetrics.w, logoMetrics.h, logoMetrics.position);
    ctx.drawImage(content.logoImg, x, y, logoMetrics.w, logoMetrics.h);
  }
}

function roundRect(ctx, x, y, w, h, r, fill) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
  if (fill) ctx.fill();
}

/* ============================================================
   UI wiring
   ============================================================ */

const state = {
  title:    BRAND.defaults.title,
  subtitle: BRAND.defaults.subtitle,
  tagline:  BRAND.defaults.tagline,
  body:     BRAND.defaults.body,
  cta:      BRAND.defaults.cta,
  theme:    BRAND.themeDefault,
  size:     'vertical',
  accentOverride: BRAND.accentDefault,
  // Brand logo (pre-loaded at startup)
  logoImg: null,
  logoPosition: 'top',
  logoSizePct: 0.16,
  // AI background — gpt-image-2 generated image, optional
  aiBgImg: null,             // HTMLImageElement
  aiBgStrength: 0.50,        // how much the AI texture shows through
};

const $ = (sel) => document.querySelector(sel);
const els = {
  title: $('#f-title'), subtitle: $('#f-subtitle'), tagline: $('#f-tagline'),
  body: $('#f-body'), cta: $('#f-cta'),
  segTheme: $('#seg-theme'), segSize: $('#seg-size'),
  swatches: $('#swatches'), accentCustom: $('#f-accent-custom'),
  preview: $('#preview'), legend: $('#legend'),
  download: $('#btn-download'), reset: $('#btn-reset'),
  logo: $('#f-logo'), logoClear: $('#f-logo-clear'),
  segLogoPos: $('#seg-logo-pos'),
  logoSize: $('#f-logo-size'), logoSizeVal: $('#f-logo-size-val'),
};

// Initial form values
els.title.value = state.title;
els.subtitle.value = state.subtitle;
els.tagline.value = state.tagline;
els.body.value = state.body;
els.cta.value = state.cta;

function buildSwatches() {
  // Remove old swatches but keep the color picker input
  [...els.swatches.querySelectorAll('.swatch')].forEach(n => n.remove());
  const presets = ACCENT_PRESETS[state.theme];
  presets.forEach((c) => {
    const sw = document.createElement('button');
    sw.className = 'swatch';
    sw.type = 'button';
    sw.style.background = c;
    sw.dataset.value = c;
    sw.title = c;
    sw.addEventListener('click', () => {
      state.accentOverride = c;
      els.accentCustom.value = c;
      [...document.querySelectorAll('.swatch')].forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      render();
    });
    els.swatches.insertBefore(sw, els.accentCustom);
  });
  // Default: clear override (use theme default)
  state.accentOverride = null;
}
els.accentCustom.addEventListener('input', () => {
  state.accentOverride = els.accentCustom.value;
  [...document.querySelectorAll('.swatch')].forEach(s => s.classList.remove('active'));
  render();
});

function bindInput(field, key) {
  field.addEventListener('input', () => { state[key] = field.value; render(); });
}
bindInput(els.title, 'title');
bindInput(els.subtitle, 'subtitle');
bindInput(els.tagline, 'tagline');
bindInput(els.body, 'body');
bindInput(els.cta, 'cta');

function bindSeg(seg, key) {
  seg.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-value]');
    if (!btn) return;
    [...seg.querySelectorAll('button')].forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state[key] = btn.dataset.value;
    if (key === 'theme') {
      buildSwatches();
      // If accent override was a custom value, clear it on theme change so the
      // theme's natural accent shines through.
      state.accentOverride = null;
    }
    render();
  });
}
bindSeg(els.segTheme, 'theme');
bindSeg(els.segSize, 'size');
bindSeg(els.segLogoPos, 'logoPosition');

/* ---- Logo upload ----
 * For PNG/JPEG: read as data URL, set as img.src.
 * For SVG: read as text, wrap in a Blob URL so the browser parses it as an image.
 * In both cases, wait for `decode()` so naturalWidth/Height are populated before
 * the next render call; otherwise the layout reservation would use 0×0.
 */
function loadLogoFile(file) {
  if (!file) return;
  const isSvg = file.type === 'image/svg+xml' || file.name.toLowerCase().endsWith('.svg');
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => { state.logoImg = img; render(); };
    img.onerror = () => { console.warn('logo failed to load'); };
    if (isSvg) {
      // Use a Blob URL so the SVG resolves any references properly.
      const blob = new Blob([reader.result], { type: 'image/svg+xml' });
      img.src = URL.createObjectURL(blob);
    } else {
      img.src = reader.result;
    }
  };
  if (isSvg) reader.readAsText(file);
  else reader.readAsDataURL(file);
}
els.logo.addEventListener('change', (e) => loadLogoFile(e.target.files[0]));
els.logoClear.addEventListener('click', () => {
  state.logoImg = null; els.logo.value = ''; render();
});
els.logoSize.addEventListener('input', () => {
  const pct = parseInt(els.logoSize.value, 10) / 100;
  state.logoSizePct = pct;
  els.logoSizeVal.textContent = `${els.logoSize.value}%`;
  render();
});

els.reset.addEventListener('click', () => {
  Object.assign(state, {
    title:    BRAND.defaults.title,
    subtitle: BRAND.defaults.subtitle,
    tagline:  BRAND.defaults.tagline,
    body:     BRAND.defaults.body,
    cta:      BRAND.defaults.cta,
    theme:    BRAND.themeDefault,
    size:     'vertical',
    accentOverride: BRAND.accentDefault,
    logoImg:       brandLogoImg,    // restored, not cleared
    logoPosition:  'top',
    logoSizePct:   0.16,
    aiBgImg:       null,
    aiBgStrength:  0.50,
  });
  if (typeof aiEls !== 'undefined' && aiEls.strength) {
    aiEls.strength.value = 50; aiEls.strengthVal.textContent = '50%';
    aiEls.prompt.value = '';
    aiEls.status.textContent = '';
  }
  els.title.value = state.title; els.subtitle.value = state.subtitle;
  els.tagline.value = state.tagline; els.body.value = state.body;
  els.cta.value = state.cta;
  els.logo.value = ''; els.logoSize.value = 16; els.logoSizeVal.textContent = '16%';
  [...document.querySelectorAll('#seg-theme button')].forEach(b => b.classList.toggle('active', b.dataset.value === BRAND.themeDefault));
  [...document.querySelectorAll('#seg-size button')].forEach(b => b.classList.toggle('active', b.dataset.value === 'vertical'));
  [...document.querySelectorAll('#seg-logo-pos button')].forEach(b => b.classList.toggle('active', b.dataset.value === 'top'));
  buildSwatches();
  render();
});

els.download.addEventListener('click', () => {
  // Always render fresh at full resolution before exporting.
  render();
  const url = els.preview.toDataURL('image/png');
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  a.href = url;
  a.download = `poster_${state.theme}_${state.size}_${ts}.png`;
  document.body.appendChild(a); a.click(); a.remove();
});

/* ---- Renderer ---- */
let fontsReady = false;
function render() {
  const ctx = els.preview.getContext('2d');
  const theme = THEMES[state.theme];
  // Apply per-render accent override
  const themeForRender = { ...theme };
  if (state.accentOverride) {
    themeForRender.accent = state.accentOverride;
    if (theme.ctaStyle === 'pill') themeForRender.ctaBg = state.accentOverride;
    if (theme.ctaStyle === 'underline') themeForRender.ctaFg = state.accentOverride;
  }
  composePoster(ctx, state, themeForRender, state.size);

  const [w, h] = SIZES[state.size];
  els.legend.textContent = `${state.theme} · ${w}×${h}` + (fontsReady ? '' : ' · 字体加载中…');
}

/* Wait for fonts to be ready, then render. */
function whenFontsReady() {
  if (!('fonts' in document)) {
    fontsReady = true; render(); return;
  }
  Promise.all([
    document.fonts.load('900 100px "Noto Sans SC"', '汉'),
    document.fonts.load('400 40px "Noto Sans SC"', '汉'),
    document.fonts.load('900 100px "Noto Serif SC"', '汉'),
    document.fonts.load('900 100px Inter', 'Aa'),
    document.fonts.load('900 100px "Playfair Display"', 'Aa'),
  ]).then(() => {
    fontsReady = true;
    render();
  }).catch(() => { fontsReady = true; render(); });
}

/* ============================================================
   AI background — gpt-image-2 integration
   ============================================================
   Architecture: user supplies their own OpenAI API key (stored in
   localStorage). We call /v1/images/generations directly from the
   browser. This is safe ONLY because each user uses their own key —
   the key never lives in the deployed HTML.
   ============================================================ */

const OPENAI_KEY_STORAGE = 'morrownest_openai_key';

const aiEls = {
  keyPanel: document.getElementById('ai-key-panel'),
  keySaved: document.getElementById('ai-key-saved'),
  keyInput: document.getElementById('f-ai-key'),
  keyMask:  document.getElementById('ai-key-mask'),
  keySaveBtn: document.getElementById('btn-ai-key-save'),
  keyEditBtn: document.getElementById('btn-ai-key-edit'),
  prompt: document.getElementById('f-ai-prompt'),
  presets: document.getElementById('ai-presets'),
  generate: document.getElementById('btn-ai-generate'),
  status: document.getElementById('ai-status'),
  strength: document.getElementById('f-ai-strength'),
  strengthVal: document.getElementById('f-ai-strength-val'),
  clear: document.getElementById('btn-ai-clear'),
};

function maskKey(k) {
  if (!k) return '';
  if (k.length < 12) return '••••' + k.slice(-4);
  return k.slice(0, 7) + '••••••••' + k.slice(-4);
}

function refreshKeyUI() {
  const k = localStorage.getItem(OPENAI_KEY_STORAGE);
  if (k) {
    aiEls.keyPanel.style.display = 'none';
    aiEls.keySaved.style.display = '';
    aiEls.keyMask.textContent = maskKey(k);
  } else {
    aiEls.keyPanel.style.display = '';
    aiEls.keySaved.style.display = 'none';
  }
}

aiEls.keySaveBtn.addEventListener('click', () => {
  const k = aiEls.keyInput.value.trim();
  if (!k.startsWith('sk-')) {
    aiEls.status.textContent = '⚠️ key 看起来不对，应该以 sk- 开头';
    aiEls.status.style.color = '#c0392b';
    return;
  }
  localStorage.setItem(OPENAI_KEY_STORAGE, k);
  aiEls.keyInput.value = '';
  aiEls.status.textContent = '✓ key 已保存到本地';
  aiEls.status.style.color = 'var(--ink-muted)';
  refreshKeyUI();
});
aiEls.keyEditBtn.addEventListener('click', () => {
  localStorage.removeItem(OPENAI_KEY_STORAGE);
  refreshKeyUI();
});

aiEls.presets.addEventListener('click', (e) => {
  const btn = e.target.closest('button.preset');
  if (!btn) return;
  aiEls.prompt.value = btn.dataset.prompt;
  aiEls.prompt.focus();
});

aiEls.strength.addEventListener('input', () => {
  state.aiBgStrength = parseInt(aiEls.strength.value, 10) / 100;
  aiEls.strengthVal.textContent = `${aiEls.strength.value}%`;
  render();
});

aiEls.clear.addEventListener('click', () => {
  state.aiBgImg = null;
  aiEls.status.textContent = '';
  render();
});

/** Map our canvas size to the closest gpt-image-2 supported aspect ratio. */
function bestImageSize() {
  const [w, h] = SIZES[state.size];
  if (Math.abs(w - h) < 50) return '1024x1024';
  return w > h ? '1536x1024' : '1024x1536';
}

async function generateAIBackground() {
  const apiKey = localStorage.getItem(OPENAI_KEY_STORAGE);
  if (!apiKey) {
    aiEls.status.textContent = '⚠️ 请先填一个 OpenAI API key';
    aiEls.status.style.color = '#c0392b';
    return;
  }
  const prompt = aiEls.prompt.value.trim();
  if (!prompt) {
    aiEls.status.textContent = '⚠️ 请先描述要生成的背景';
    aiEls.status.style.color = '#c0392b';
    return;
  }

  aiEls.generate.disabled = true;
  aiEls.status.style.color = 'var(--ink-muted)';
  aiEls.status.textContent = '⏳ 正在调用 gpt-image-2，约 10–25 秒…';

  try {
    const resp = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`,
      },
      body: JSON.stringify({
        model: 'gpt-image-2',
        prompt,
        size: bestImageSize(),
        quality: 'medium',
        n: 1,
      }),
    });

    if (!resp.ok) {
      const errText = await resp.text();
      let detail = errText;
      try {
        const j = JSON.parse(errText);
        detail = j?.error?.message || errText;
      } catch (e) { /* keep raw */ }
      throw new Error(`HTTP ${resp.status}: ${detail.slice(0, 200)}`);
    }

    const data = await resp.json();
    const b64 = data?.data?.[0]?.b64_json;
    if (!b64) throw new Error('返回里没有 b64_json 字段');

    // Decode → Image element → use as bg
    const img = new Image();
    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = () => reject(new Error('AI 图解码失败'));
      img.src = `data:image/png;base64,${b64}`;
    });
    state.aiBgImg = img;
    aiEls.status.textContent = '✓ 背景已生成。可以拖"显示强度"滑块调节。';
    aiEls.status.style.color = '#2d7a4a';
    render();
  } catch (err) {
    aiEls.status.style.color = '#c0392b';
    const msg = err.message || String(err);
    if (msg.includes('Insufficient') || msg.includes('quota') || msg.includes('credit')) {
      aiEls.status.textContent = '✗ OpenAI 账户余额不足，请先充值';
    } else if (msg.includes('Incorrect API key') || msg.includes('Invalid')) {
      aiEls.status.textContent = '✗ API key 不对，请点"更换 key"重新输入';
    } else if (msg.includes('rate limit') || msg.includes('Rate')) {
      aiEls.status.textContent = '✗ 触发速率限制，等几秒再试';
    } else {
      aiEls.status.textContent = '✗ ' + msg;
    }
  } finally {
    aiEls.generate.disabled = false;
  }
}

aiEls.generate.addEventListener('click', generateAIBackground);
refreshKeyUI();

/* ---- Bootstrap brand logo (the team's MORROWNEST mark, embedded above) ---- */
let brandLogoImg = null;
(function preloadBrandLogo() {
  const img = new Image();
  img.onload = () => {
    brandLogoImg = img;
    state.logoImg = img;     // pre-installed by default
    render();
  };
  img.src = BRAND_LOGO_DATAURL;
  // Also wire the topbar brand mark to the same data URL so the chrome
  // matches the poster.
  const brandMark = document.getElementById('brand-logo');
  if (brandMark) brandMark.src = BRAND_LOGO_DATAURL;
})();

// Pre-fill text inputs from BRAND.defaults
els.title.value = state.title;
els.subtitle.value = state.subtitle;
els.tagline.value = state.tagline;
els.body.value = state.body;
els.cta.value = state.cta;

buildSwatches();
render();        // first paint (may use fallback fonts; brand logo races in)
whenFontsReady();// then re-render once Google Fonts arrive
</script>
</body>
</html>
